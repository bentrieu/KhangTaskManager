services:
  backend:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
        restart: true

  db:
    image: postgres
    user: postgres
    restart: always
    environment:
      - POSTGRES_DB=taskmanager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=example
    ports:
      - "5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
